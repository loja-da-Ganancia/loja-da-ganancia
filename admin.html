<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Painel Administrativo | Greed Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ===== ESTILO GERAL ESCURO ===== */
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: Arial, Helvetica, sans-serif;
        }

        .navbar-brand img {
            height: 45px;
        }

        /* ===== CARDS DE ESTATÍSTICAS ===== */
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            transition: 0.2s;
        }
        .card:hover {
            border-color: #00d2ff;
            box-shadow: 0 4px 10px rgba(0, 210, 255, 0.15);
        }
        .card-header {
            background-color: #0d1117;
            border-bottom: 1px solid #30363d;
            color: #ffffff;
            font-weight: bold;
        }
        .card-body {
            color: #c9d1d9;
        }
        .card-title {
            color: #ffffff;
        }

        /* ===== TABELA ===== */
        .table {
            color: #c9d1d9;
            background-color: #161b22;
            border-color: #30363d;
        }
        .table-striped > tbody > tr:nth-of-type(odd) {
            background-color: #0d1117;
        }
        .table-bordered {
            border-color: #30363d;
        }
        .table-bordered td, .table-bordered th {
            border-color: #30363d;
        }
        .table thead th {
            background-color: #0d1117;
            border-bottom: 2px solid #30363d;
            color: #ffffff;
        }
        .table tbody tr:hover {
            background-color: #21262d;
        }

        /* ===== BADGES ===== */
        .role-badge {
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
        }
        .bg-danger {
            background-color: #e53238 !important;
        }
        .bg-secondary {
            background-color: #30363d !important;
        }

        /* ===== BOTÕES ===== */
        .btn-warning {
            background-color: #ffc107;
            border-color: #ffc107;
            color: #000;
        }
        .btn-danger {
            background-color: #e53238;
            border-color: #e53238;
        }
        .btn-danger:hover {
            background-color: #c91f2c;
            border-color: #c91f2c;
        }
        .btn-warning:hover {
            background-color: #e0a800;
            border-color: #e0a800;
        }

        /* ===== TÍTULOS ===== */
        h2, h3, h4 {
            color: #ffffff;
        }
        .text-muted {
            color: #8b949e !important;
        }

        /* ===== FOOTER ===== */
        footer {
            background-color: #161b22 !important;
            border-top: 1px solid #30363d;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 border-bottom border-secondary">
        <a class="navbar-brand" href="index.html">
            <img src="imagens/logo_sem_fundo_greedstore.png" alt="Logo Greed Store">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="marketplace.html">Marketplace</a>
                <a class="nav-link" href="decks.html">Decks</a>
                <a class="nav-link" href="comunidade.html">Comunidade</a>
                <a class="nav-link" href="favoritos.html">Favoritos</a>
                <!-- O link "Conta" será inserido dinamicamente pelo auth.js -->
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>👑 Painel do Administrador</h2>
            <button class="btn btn-danger" id="logoutBtn">Sair</button>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-header">Total de Usuários</div>
                    <div class="card-body">
                        <h5 class="card-title" id="totalUsuarios">0</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-success mb-3">
                    <div class="card-header">Decks Criados</div>
                    <div class="card-body">
                        <h5 class="card-title" id="totalDecks">0</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-info mb-3">
                    <div class="card-header">Total de Cartas nos Decks</div>
                    <div class="card-body">
                        <h5 class="card-title" id="totalCartas">0</h5>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="border-bottom border-secondary pb-2 mb-3">📋 Gerenciar Usuários</h3>
        <div class="table-responsive">
            <table class="table table-striped table-bordered table-users">
                <thead class="table-dark">
                    <tr>
                        <th>Usuário</th>
                        <th>Papel</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <footer class="bg-dark text-center text-white py-4 mt-5 border-top border-secondary">
        <p>&copy; 2026 Greed Store™. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
