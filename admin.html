<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Painel Administrativo | Greed Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand img {
            height: 45px;
        }
        .table-users th, .table-users td {
            vertical-align: middle;
        }
        .role-badge {
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="index.html">
            <img src="imagens/logo_sem_fundo_greedstore.png" alt="Logo Greed Store">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
        <div class="navbar-nav ms-auto">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="marketplace.html">Marketplace</a>
        <a class="nav-link" href="decks.html">Decks</a>
        <a class="nav-link" href="comunidade.html">Comunidade</a>
        <a class="nav-link" href="favoritos.html">Favoritos</a>
        <!-- O link "Conta" foi removido – será inserido dinamicamente pelo auth.js -->
        </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>👑 Painel do Administrador</h2>
            <button class="btn btn-danger" id="logoutBtn">Sair</button>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-header">Total de Usuários</div>
                    <div class="card-body">
                        <h5 class="card-title" id="totalUsuarios">0</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-success mb-3">
                    <div class="card-header">Decks Criados</div>
                    <div class="card-body">
                        <h5 class="card-title" id="totalDecks">0</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-info mb-3">
                    <div class="card-header">Total de Cartas nos Decks</div>
                    <div class="card-body">
                        <h5 class="card-title" id="totalCartas">0</h5>
                    </div>
                </div>
            </div>
        </div>

        <h3>📋 Gerenciar Usuários</h3>
        <div class="table-responsive">
            <table class="table table-striped table-bordered table-users">
                <thead class="table-dark">
                    <tr>
                        <th>Usuário</th>
                        <th>Papel</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <footer class="bg-dark text-center text-white py-3 mt-5">
        <p>&copy; 2026 Greed Store™. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
