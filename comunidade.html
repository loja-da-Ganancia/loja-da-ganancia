<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade | Greed Store</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand img { height: 45px; }
        
        /* Estilo dos Cards de Post */
        .post-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            margin-bottom: 2rem;
            transition: transform 0.2s;
        }
        .post-card:hover { border-color: #00d2ff; }

        /* Foto do Autor Dinâmica */
        .author-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00d2ff;
            background-color: #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #fff;
        }
        .author-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* Grid de Cartas no Post */
        .deck-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            background: #0d1117;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        .card-mini-img { width: 100%; border-radius: 4px; border: 1px solid #444; }

        .btn-comunidade {
            background-color: #212529;
            color: #00d2ff;
            border: 1px solid #00d2ff;
            font-weight: bold;
        }
        .btn-comunidade:hover { background-color: #00d2ff; color: #000; }

        /* Ajuste de escala para posts grandes */
        .reduced-scale { transform: scale(0.95); transform-origin: top center; }
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 border-bottom border-secondary">
        <a class="navbar-brand" href="index.html">
            <img src="imagens/logo_sem_fundo_greedstore.png" alt="Logo">
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="martplace.html">Marketplace</a>
            <a class="nav-link" href="decks.html">Decks</a>
            <a class="nav-link" href="comunidade.html">Comunidade</a>
            <a class="nav-link" href="favoritos.html">Favoritos</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-white">Postagens</h2>
            <button class="btn btn-comunidade" onclick="prepararNovoPost()">+ Postar meu Deck</button>
        </div>

        <div class="row">
            <div class="col-lg-8 mx-auto" id="feed">
                <!-- Posts carregados aqui -->
            </div>
        </div>
    </div>

    <!-- Modal de Postagem -->
    <div class="modal fade" id="modalPost" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitle">Compartilhar Estratégia</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formPost">
                        <input type="hidden" id="postId">
                        <div class="mb-3">
                            <label class="form-label">Nome de Exibição</label>
                            <input type="text" class="form-control bg-secondary text-white border-0" id="postAuthorName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descrição / Combo</label>
                            <textarea class="form-control bg-secondary text-white border-0" id="postComment" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Escolha seu Deck</label>
                            <select class="form-select bg-secondary text-white border-0" id="postDeckId" required></select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Fechar</button>
                    <button type="button" class="btn btn-info fw-bold" onclick="publicarPost()">Publicar Agora</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-center text-white py-4 mt-5 border-top border-secondary">
        <p>&copy; 2026 Greed Store™ - Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>

    <script>
        const DB_POSTS = 'greedstore_posts';
        const DB_DECKS = 'greedstore_decks';
        const DB_USERS = 'greedstore_users';
        let modalInstance;

        document.addEventListener('DOMContentLoaded', () => {
            modalInstance = new bootstrap.Modal(document.getElementById('modalPost'));
            atualizarFeed();
        });

        // Abre modal para novo post
        function prepararNovoPost() {
            if (!isLoggedIn()) return alert("Logue para interagir!");
            
            document.getElementById('formPost').reset();
            document.getElementById('postId').value = '';
            document.getElementById('modalTitle').innerText = "Novo Post";
            
            const user = getCurrentUser();
            document.getElementById('postAuthorName').value = user.username;
            
            carregarMeusDecks();
            modalInstance.show();
        }

        // Carrega decks no select
        function carregarMeusDecks() {
            const select = document.getElementById('postDeckId');
            const decks = JSON.parse(localStorage.getItem(DB_DECKS) || '[]');
            
            if (decks.length === 0) {
                select.innerHTML = '<option value="">Crie um deck primeiro na aba Decks!</option>';
            } else {
                select.innerHTML = '<option value="">-- Selecione um Deck --</option>' + 
                    decks.map(d => `<option value="${d.id}">${d.nome}</option>`).join('');
            }
        }

        // Publicar ou Editar
        function publicarPost() {
            const id = document.getElementById('postId').value;
            const authorName = document.getElementById('postAuthorName').value.trim();
            const comment = document.getElementById('postComment').value.trim();
            const deckId = document.getElementById('postDeckId').value;

            if (!authorName || !comment || !deckId) return alert("Preencha os campos!");

            const decks = JSON.parse(localStorage.getItem(DB_DECKS) || '[]');
            const deckObj = decks.find(d => d.id === deckId);
            const user = getCurrentUser();
            let posts = JSON.parse(localStorage.getItem(DB_POSTS) || '[]');

            if (id) {
                const idx = posts.findIndex(p => p.id === id);
                if (idx !== -1) {
                    posts[idx].authorName = authorName;
                    posts[idx].comment = comment;
                    posts[idx].deck = deckObj;
                }
            } else {
                posts.unshift({
                    id: Date.now().toString(),
                    authorUsername: user.username,
                    authorName: authorName,
                    comment: comment,
                    deck: deckObj,
                    date: new Date().toLocaleString()
                });
            }

            localStorage.setItem(DB_POSTS, JSON.stringify(posts));
            modalInstance.hide();
            atualizarFeed();
        }

        // Renderiza o feed com sincronização de perfil
        function atualizarFeed() {
            const container = document.getElementById('feed');
            const posts = JSON.parse(localStorage.getItem(DB_POSTS) || '[]');
            const users = JSON.parse(localStorage.getItem(DB_USERS) || '[]');
            const currentUser = typeof getCurrentUser !== 'undefined' ? getCurrentUser() : null;

            if (posts.length === 0) {
                container.innerHTML = '<p class="text-center text-muted">Nenhum duelo postado ainda.</p>';
                return;
            }

            container.innerHTML = '';
            posts.forEach(post => {
                const autorReal = users.find(u => u.username === post.authorUsername);
                const isOwner = currentUser && (currentUser.username === post.authorUsername || currentUser.role === 'admin');
                const foto = (autorReal && autorReal.profilePicUrl) ? autorReal.profilePicUrl : '';

                container.innerHTML += `
                <div class="post-card p-3 reduced-scale">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="d-flex align-items-center gap-3">
                            <div class="author-avatar">
                                ${foto ? `<img src="${foto}">` : '👤'}
                            </div>
                            <div>
                                <h6 class="m-0 text-white">${post.authorName}</h6>
                                <small class="text-muted">@${post.authorUsername} • ${post.date}</small>
                            </div>
                        </div>
                        <div class="dropdown">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle text-white" data-bs-toggle="dropdown">Opções</button>
                            <ul class="dropdown-menu dropdown-menu-dark">
                                <li><a class="dropdown-item" href="#" onclick="compartilharZap('${post.id}'); return false;">Compartilhar</a></li>
                                ${isOwner ? `
                                    <li><hr class="dropdown-divider"></li>
                                    <li><a class="dropdown-item" href="#" onclick="editarPost('${post.id}')">Editar</a></li>
                                    <li><a class="dropdown-item text-danger" href="#" onclick="excluirPost('${post.id}')">Excluir</a></li>
                                ` : ''}
                            </ul>
                        </div>
                    </div>
                    <p class="text-light">${post.comment}</p>
                    <div class="deck-preview-grid">
                        ${post.deck.cartas.map(c => `<img src="${c.imagem}" class="card-mini-img" title="${c.nome}">`).join('')}
                    </div>
                    <div class="mt-2"><small class="text-info">Deck: ${post.deck.nome} (${post.deck.cartas.length} cartas)</small></div>
                </div>`;
            });
        }

        function editarPost(id) {
            const posts = JSON.parse(localStorage.getItem(DB_POSTS) || '[]');
            const post = posts.find(p => p.id === id);
            if (!post) return;

            document.getElementById('postId').value = post.id;
            document.getElementById('postAuthorName').value = post.authorName;
            document.getElementById('postComment').value = post.comment;
            
            carregarMeusDecks();
            document.getElementById('postDeckId').value = post.deck.id;
            
            document.getElementById('modalTitle').innerText = "Editar Minha Postagem";
            modalInstance.show();
        }

        function excluirPost(id) {
            if (!confirm("Excluir postagem?")) return;
            let posts = JSON.parse(localStorage.getItem(DB_POSTS) || '[]');
            localStorage.setItem(DB_POSTS, JSON.stringify(posts.filter(p => p.id !== id)));
            atualizarFeed();
        }

        function compartilharZap(postId) {
            const posts = JSON.parse(localStorage.getItem(DB_POSTS) || '[]');
            const post = posts.find(p => p.id === postId);
            if (!post) return;

            const counts = {};
            post.deck.cartas.forEach(c => counts[c.nome] = (counts[c.nome] || 0) + 1);
            let lista = `🃏 Deck: *${post.deck.nome}*\n\n`;
            for (const [n, q] of Object.entries(counts)) lista += `- ${q}x ${n}\n`;

            if (navigator.share) {
                navigator.share({ title: post.deck.nome, text: lista });
            } else {
                navigator.clipboard.writeText(lista);
                alert("Lista copiada!");
            }
        }
    </script>
</body>
</html>
