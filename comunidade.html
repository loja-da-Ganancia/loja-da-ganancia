<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade | Greed Store</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand img { height: 45px; }
        
        /* Estilo dos Cards de Post */
        .post-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            margin-bottom: 2rem;
            transition: transform 0.2s;
        }
        .post-card:hover { border-color: #00d2ff; }

        /* Foto do Autor Dinâmica */
        .author-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00d2ff;
            background-color: #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #fff;
        }
        .author-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* Grid de Cartas no Post */
        .deck-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            background: #0d1117;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        .card-mini-img { width: 100%; border-radius: 4px; border: 1px solid #444; }

        .btn-comunidade {
            background-color: #212529;
            color: #00d2ff;
            border: 1px solid #00d2ff;
            font-weight: bold;
        }
        .btn-comunidade:hover { background-color: #00d2ff; color: #000; }

        /* Ajuste de escala para posts grandes */
        .reduced-scale { transform: scale(0.95); transform-origin: top center; }
        #fullDeckCardsContainer .card-item {
            cursor: pointer;
            transition: transform 0.2s;
        }
        #fullDeckCardsContainer .card-item:hover {
            transform: scale(1.05);
            border-color: #00d2ff;
        }
        #fullDeckCardsContainer img {
            width: 100%;
            border-radius: 8px;
            background: #0d1117;
            padding: 5px;
        }
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 border-bottom border-secondary">
        <a class="navbar-brand" href="index.html">
            <img src="imagens/logo_sem_fundo_greedstore.png" alt="Logo">
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="marketplace.html">Marketplace</a>
            <a class="nav-link" href="decks.html">Decks</a>
            <a class="nav-link" href="comunidade.html">Comunidade</a>
            <a class="nav-link" href="favoritos.html">Favoritos</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-white">Postagens</h2>
            <button class="btn btn-comunidade" onclick="prepararNovoPost()">+ Postar meu Deck</button>
        </div>

        <div class="row">
            <div class="col-lg-8 mx-auto" id="feed">
                <!-- Posts carregados aqui -->
            </div>
        </div>
    </div>

    <!-- Modal de Postagem -->
    <div class="modal fade" id="modalPost" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitle">Compartilhar Estratégia</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formPost">
                        <input type="hidden" id="postId">
                        <div class="mb-3">
                            <label class="form-label">Nome de Exibição</label>
                            <input type="text" class="form-control bg-secondary text-white border-0" id="postAuthorName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descrição / Combo</label>
                            <textarea class="form-control bg-secondary text-white border-0" id="postComment" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Escolha seu Deck</label>
                            <select class="form-select bg-secondary text-white border-0" id="postDeckId" required></select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Fechar</button>
                    <button type="button" class="btn btn-info fw-bold" onclick="publicarPost()">Publicar Agora</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-center text-white py-4 mt-5 border-top border-secondary">
        <p>&copy; 2026 Greed Store™ - Todos os direitos reservados.</p>
    </footer>

    <!-- MODAL FULLSCREEN PARA VISUALIZAR O DECK COMPLETO -->
    <div class="modal fade" id="fullDeckModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
    <div class="modal-content bg-dark text-white">
        <div class="modal-header border-secondary">
            <h5 class="modal-title" id="fullDeckModalTitle">Visualizando Deck</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="fullDeckModalBody">
            <div class="row g-3" id="fullDeckCardsContainer">
                <!-- Cards serão inseridos dinamicamente -->
            </div>
        </div>
        <div class="modal-footer border-secondary">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Fechar</button>
        </div>
    </div>
    </div>
    </div>

    <!-- MODAL PARA DETALHES DA CARTA (SIMPLIFICADO) -->
    <div class="modal fade" id="cardInfoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content bg-dark text-white">
        <div class="modal-header border-secondary">
            <h5 class="modal-title" id="cardInfoModalTitle">Detalhes da Carta</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center" id="cardInfoModalBody">
            <!-- Conteúdo dinâmico -->
        </div>
    </div>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>

    <script src="js/comunidade.js"></script>
</body>
</html>
