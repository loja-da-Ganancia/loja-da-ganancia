<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conta | Greed Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand img { height: 45px; }
        .form-container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        @media (max-width: 576px) {
            .form-container {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="index.html">
            <img src="imagens/logo_sem_fundo_greedstore.png" alt="Logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="marketplace.html">Marketplace</a>
                <a class="nav-link" href="decks.html">Decks</a>
                <a class="nav-link" href="comunidade.html">Comunidade</a>
                <a class="nav-link" href="favoritos.html">Favoritos</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <ul class="nav nav-tabs" id="myTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Entrar</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Cadastrar</button>
                </li>
            </ul>
            <div class="tab-content" id="myTabContent">
                <!-- Login -->
                <div class="tab-pane fade show active" id="login" role="tabpanel">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="loginUsername" class="form-label">Usuário</label>
                            <input type="text" class="form-control" id="loginUsername" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Entrar</button>
                        <div id="loginMessage" class="mt-3 text-center"></div>
                    </form>
                </div>
                <!-- Cadastro -->
                <div class="tab-pane fade" id="register" role="tabpanel">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="regUsername" class="form-label">Usuário</label>
                            <input type="text" class="form-control" id="regUsername" required minlength="3">
                        </div>
                        <div class="mb-3">
                            <label for="regPassword" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="regPassword" required minlength="3">
                        </div>
                        <div class="mb-3">
                            <label for="regConfirm" class="form-label">Confirmar senha</label>
                            <input type="password" class="form-control" id="regConfirm" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Cadastrar</button>
                        <div id="registerMessage" class="mt-3 text-center"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-center text-white py-3 mt-5">
        <p>&copy; 2026 Greed Store™. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/conta.js"></script>
</body>
</html>
