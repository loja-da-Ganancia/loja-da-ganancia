<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meus Decks | Greed Store</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
        }
        .navbar-brand img { height: 45px; }
        .form-control {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }
        .form-control:focus {
            background-color: #0d1117;
            color: #ffffff;
            border-color: #00d2ff;
            box-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
        }
        /* Deck card (para o builder) */
        .deck-card {
            background-color: #161b22;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #30363d;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: 0.2s;
        }
        .deck-card.active {
            border: 2px solid #00d2ff;
            background-color: #1c232d;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }
        .deck-nome {
            cursor: pointer;
            color: #ffffff;
            font-size: 1.2rem;
        }
        .editar-nome {
            background: none;
            border: none;
            color: #00d2ff;
            font-size: 16px;
            cursor: pointer;
            margin-left: 8px;
        }
        .deck-area {
            background: #0d1117;
            min-height: 120px;
            padding: 12px;
            margin-top: 15px;
            border-radius: 6px;
            border: 1px inset #30363d;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .carta-mini {
            width: 65px;
            text-align: center;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 4px;
            position: relative;
            transition: transform 0.2s;
        }
        .carta-mini:hover {
            transform: scale(1.1);
            z-index: 5;
            border-color: #ffc107;
        }
        .carta-mini img {
            width: 100%;
            border-radius: 3px;
        }
        .carta-mini p {
            font-size: 9px;
            margin: 4px 0 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #c9d1d9;
        }
        .remover-carta {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #e53238;
            color: white;
            border: 2px solid #0d1117;
            font-size: 10px;
            font-weight: bold;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cartas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .carta {
            background-color: #161b22;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #30363d;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .carta:hover {
            transform: scale(1.05);
            border-color: #00ff00;
            box-shadow: 0 4px 10px rgba(0, 255, 0, 0.2);
        }
        .carta img {
            width: 100%;
            height: auto;
            object-fit: contain;
            border-radius: 5px;
        }
        .carta p {
            color: #ffffff;
            font-size: 11px;
            margin: 8px 0 0 0;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .info-btn {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.8);
            color: #00d2ff;
            border: 1px solid #00d2ff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toast-success {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ea043;
            color: white;
            padding: 12px 25px;
            border-radius: 6px;
            z-index: 1050;
            display: none;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #161b22;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }
        .modal-header, .modal-footer { border-color: #30363d; }
        
        /* Botões de modo */
        .mode-btn.active {
            background-color: #00d2ff;
            color: #000;
            border-color: #00d2ff;
        }
        .deck-list-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            transition: 0.2s;
            cursor: pointer;
        }
        .deck-list-card:hover {
            border-color: #00d2ff;
            transform: translateY(-2px);
        }
        @media (max-width: 991px) {
            .cartas { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
            .carta-mini { width: 55px; }
        }
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 border-bottom border-secondary">
        <a class="navbar-brand" href="index.html">
            <img src="imagens/logo_sem_fundo_greedstore.png" alt="Logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="marketplace.html">Marketplace</a>
                <a class="nav-link active" href="decks.html">Decks</a>
                <a class="nav-link" href="comunidade.html">Comunidade</a>
                <a class="nav-link" href="favoritos.html">Favoritos</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="text-white m-0">🗃️ Decks</h4>
            <div class="btn-group" role="group">
                <button type="button" id="btnModoCriar" class="btn btn-outline-info active mode-btn">✏️ Criar/Atualizar Deck</button>
                <button type="button" id="btnModoVisualizar" class="btn btn-outline-info mode-btn">👁️ Visualizar Decks</button>
            </div>
        </div>

        <!-- MODO CONSTRUTOR (builder) -->
        <div id="modoConstrutor">
            <div class="row g-4">
                <div class="col-12 col-lg-7">
                    <div class="deck-card" id="builderDeckCard">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <strong class="deck-nome fw-bold" id="builderDeckNome">Novo Deck</strong>
                                <button class="editar-nome" id="builderRenomearBtn" title="Renomear">✏️</button>
                            </div>
                            <div>
                                <button class="btn btn-sm btn-success" id="btnSalvarDeck">💾 Salvar Deck</button>
                                <button class="btn btn-sm btn-outline-danger" id="btnNovoDeckBuilder">➕ Novo Deck</button>
                            </div>
                        </div>
                        <div class="deck-area" id="builderDeckArea"></div>
                        <div class="d-flex justify-content-between mt-3 border-top border-secondary pt-2">
                            <span class="text-muted small" id="builderCardCount">0/60 Cartas</span>
                            <div>
                                <button class="btn btn-sm btn-outline-light" id="builderCarregarDeck">📂 Carregar outro deck</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-lg-5">
                    <div class="sticky-top" style="top: 20px; z-index: 100;">
                        <div class="p-3 rounded-3" style="background-color: #161b22; border: 1px solid #30363d;">
                            <h5 class="text-white mb-3">🔍 Buscar Cartas para o Deck</h5>
                            <div class="input-group mb-3">
                                <input type="text" id="campoBuscaCartas" class="form-control" placeholder="Ex: Mago Negro">
                                <button class="btn btn-info fw-bold" id="btnBuscarCartas">Buscar</button>
                            </div>
                            <div id="listaCartas" class="cartas" style="max-height: 60vh; overflow-y: auto; padding-right: 5px;"></div>
                            <div id="paginacaoCartas" class="mt-4 d-flex justify-content-center"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- MODO VISUALIZAÇÃO (listagem) -->
        <div id="modoVisualizacao" style="display: none;">
            <div class="row g-4" id="listaDecksVisualizacao"></div>
        </div>
    </div>

    <!-- Modais -->
    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white" id="infoModalLabel">Detalhes da Carta</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="saveToast" class="toast-success">✔️ Deck salvo com sucesso!</div>

    <!-- Modal fullscreen para visualizar deck (reutiliza o mesmo da comunidade) -->
    <div class="modal fade" id="fullDeckModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="fullDeckModalTitle">Visualizando Deck</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="fullDeckModalBody">
                    <div class="row g-3" id="fullDeckCardsContainer"></div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="cardInfoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-md">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="cardInfoModalTitle">Detalhes da Carta</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center" id="cardInfoModalBody"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="carregarDeckModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Carregar um deck existente</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <select id="selectCarregarDeck" class="form-select bg-secondary text-white border-0"></select>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="confirmarCarregarDeck">Carregar</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-center text-white py-4 mt-5 border-top border-secondary">
        <p>&copy; 2026 Greed Store™. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/deck.js"></script>
</body>
</html>
