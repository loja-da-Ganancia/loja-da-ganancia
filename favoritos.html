<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Favoritos | Greed Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ===== ESTILO GERAL ESCURO ===== */
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: Arial, Helvetica, sans-serif;
        }

        .navbar-brand img { height: 45px; }

        /* ===== CARDS DE FAVORITOS ===== */
        .card-favorito {
            transition: 0.2s;
            border: none;
            background-color: #161b22;
            border: 1px solid #30363d !important;
            border-radius: 8px;
        }
        .card-favorito:hover {
            transform: translateY(-2px);
            border-color: #00d2ff !important;
            box-shadow: 0 4px 10px rgba(0, 210, 255, 0.15);
        }
        .card-favorito img {
            height: 280px;
            object-fit: contain;
            padding: 10px;
            background-color: #0d1117;
            border-bottom: 1px solid #30363d;
        }
        .card-favorito .card-title {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
        }
        .card-favorito .card-text {
            color: #2ea043;
            font-weight: bold;
        }
        .btn-outline-danger {
            border-color: #e53238;
            color: #e53238;
        }
        .btn-outline-danger:hover {
            background-color: #e53238;
            color: #fff;
        }

        /* ===== TÍTULOS ===== */
        h2, h3, h4 {
            color: #ffffff;
        }
        .text-muted {
            color: #8b949e !important;
        }

        /* ===== FOOTER ===== */
        footer {
            background-color: #161b22 !important;
            border-top: 1px solid #30363d;
        }

        @media (max-width: 576px) {
            .card-favorito img {
                height: 240px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 border-bottom border-secondary">
        <a class="navbar-brand" href="index.html">
            <img src="imagens/logo_sem_fundo_greedstore.png" alt="Logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="marketplace.html">Marketplace</a>
                <a class="nav-link" href="decks.html">Decks</a>
                <a class="nav-link" href="comunidade.html">Comunidade</a>
                <a class="nav-link active" href="favoritos.html">Favoritos</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4 border-bottom border-secondary pb-2">⭐ Cartas Favoritas</h2>
        <div class="row g-4" id="favoritosContainer">
            <!-- As cartas serão inseridas dinamicamente -->
        </div>
    </div>

    <footer class="bg-dark text-center text-white py-4 mt-5 border-top border-secondary">
        <p>&copy; 2026 Greed Store™. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/favoritos.js"></script>
</body>
</html>
