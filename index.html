<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Um site de compra de cartas e decks de Yu Gi Oh!">

    <title>Home</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: rgb(7, 2, 27);
        }

        /* menu */
        .navbar-brand img {
            height: 45px;
        }

        /* banner e imagem de fundo */
        .banner-home {
            position: relative;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .logo-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .textoBanner {
            margin: 50px auto 20px auto; 
            font-size: 500%;
            text-align: center;
            color: #ffffff;
            background-color: rgba(0, 0, 0, 0.5);
            width: fit-content;
            padding: 20px;
            border-radius: 10px;
        }

        .textoIntroducão {
            margin: 0 auto 50px auto;
            font-size: 150%; 
            text-align: left;
            color: #ffffff;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 15px;
            width: fit-content;
            border-radius: 10px;
        }

        .gradienteVerdeRoxo {
            background: linear-gradient(45deg, #00ff00, #800080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: #ffffff 2px;
        }

        #containerCartaDestaque {
            position: relative;
            width: 100%;
        }

        /* LARGURA FIXA E SOMBRA NA CARTA */
        #cartaDestaque {
            margin: 0 auto;
            width: 18rem; 
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* TAMANHO DO TÍTULO CORRIGIDO PARA CABER NA CARTA */
        .card-title {
            font-size: 24px; 
            font-weight: bold;
            margin-top: 10px;
        }
        
        .card-text {
            font-size: 16px;
        }


    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="#">
            <img src="imagens/logo_sem_fundo_greedstore.png" alt="Logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="martplace.html">Marketplace</a>
                <a class="nav-link" href="decks.html">Decks</a>
                <a class="nav-link" href="comunidade.html">Comunidade</a>
                <a class="nav-link" href="favoritos.html">Favoritos</a>
                <a class="nav-link" href="contas.html">Conta</a>
            </div>
        </div>
    </nav>


    <main>
        <section class="banner-home">
            <div class="textoBanner">
                Bem-vindo à<br>
                <span class="gradienteVerdeRoxo" style="font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;">
                    Greed Store!
                </span>
            </div>

            <div class="textoIntroducão">
                ● Aqui você pode comprar cartas.💸➔🃏 <br> 
                ● montar decks🤚🃏🐉🀄 <br>
                ● e se conectar com outros jogadores de Yu-Gi-Oh!🌎
            </div>
            
            <div class="container text-center" id="containerCartaDestaque">
                <h2 class="mb-4 text-white text-center">Carta em Destaque</h2>
                <div class="row justify-content-center">
                    <div class="col-md-4 mb-4 d-flex justify-content-center">
                        <div class="card mx-auto" id="cartaDestaque">
                            <img src="imagens/pote-ganancia.png" class="card-img-top" alt="Pote da ganância">
                            <div class="card-body">
                                <h5 class="card-title">Pote da ganância</h5>
                                <p class="card-text">Compre 2 cartas do seu deck.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-dark text-center text-white py-3 mt-5">
        <p>&copy; 2026 Greed Store™. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
