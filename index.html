<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pesquisar Cartas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background:#f2f2f2;
}

/* menu */

.navbar-brand img{
height:45px;
}

/* barra pesquisa */

.barra-pesquisa{
background:white;
padding:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

/* filtro */

.filtro{
background:white;
padding:20px;
border-radius:6px;
}

/* cartas */

.card{
transition:0.2s;
border:none;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{
height:300px;
object-fit:cover;
}

</style>

</head>

<body>

<!-- MENU -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

<a class="navbar-brand" href="#">
<img src="imagens/logo.png">
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<div class="navbar-nav ms-auto">

<a class="nav-link" href="index.html">Pesquisar Cartas</a>
<a class="nav-link" href="criar-deck.html">Criação de Deck</a>
<a class="nav-link" href="#">Visualizar Decks</a>
<a class="nav-link" href="#">Buscar Lojas</a>
<a class="nav-link" href="#">Favoritos</a>
<a class="nav-link" href="conta.html">Conta</a>

</div>

</div>

</nav>


<!-- BARRA PESQUISA -->

<div class="barra-pesquisa">

<div class="container">

<div class="input-group input-group-lg">

<input 
type="text" 
id="campoPesquisa"
class="form-control"
placeholder="Pesquisar carta..."
onkeyup="pesquisarCarta()">

<button class="btn btn-dark" onclick="pesquisarCarta()">
Pesquisar
</button>

</div>

</div>

</div>


<!-- CONTEUDO -->

<div class="container mt-4">

<div class="row g-4">

<!-- FILTRO -->

<aside class="col-lg-3">

<div class="filtro">

<h5>Tipo de Carta</h5>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Monstro</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Magia</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Armadilha</label>
</div>

</div>

</aside>


<!-- CARTAS -->

<main class="col-lg-9">

<div class="row g-4" id="listaCartas">

<!-- CARTAS GERADAS PELO JAVASCRIPT -->

</div>


<!-- PAGINAÇÃO -->

<nav class="mt-4">

<ul class="pagination justify-content-center" id="paginacao">

</ul>

</nav>

</main>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/script.js"></script>

</body>

</html>
