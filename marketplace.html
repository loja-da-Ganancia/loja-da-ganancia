<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace | Greed Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* MODO ESCURO GERAL */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
        }

        .navbar-brand img { height: 45px; }

        /* BARRA DE PESQUISA */
        .barra-pesquisa {
            background: #161b22;
            padding: 20px;
            border-bottom: 1px solid #30363d;
        }

        /* PAINEL DE FILTROS */
        .filtro-container {
            background: #161b22;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        .filtro-container label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #8b949e;
            margin-top: 10px;
        }
        .form-control, .form-select {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }
        .form-control:focus, .form-select:focus {
            background-color: #0d1117;
            color: #ffffff;
            border-color: #00d2ff;
            box-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
        }

        /* ESTILO DOS CARDS (IMAGEM INTEIRA) */
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            transition: 0.2s;
            cursor: pointer;
            position: relative;
        }
        .card:hover {
            transform: scale(1.03);
            border-color: #00d2ff;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.2);
        }
        .card img {
            height: 280px;
            object-fit: contain; 
            padding: 10px;
            background-color: #0d1117;
            border-bottom: 1px solid #30363d;
        }

        /* ESTRELA DE FAVORITO NO CARD */
        .favoritar-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #ffc107;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 10;
            transition: 0.2s;
            color: transparent;
            text-shadow: 0 0 0 #ffc107;
        }
        .favoritar-btn:hover {
            transform: scale(1.15);
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 8px #ffc107;
        }

        /* MODAL ESCURO E COMPARADOR DE PREÇOS */
        .modal-content {
            background-color: #161b22;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }
        .modal-header, .modal-footer { border-color: #30363d; }
        
        .vendor-list { display: flex; flex-direction: column; gap: 10px; }
        .vendor-card {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .vendor-card:hover { border-color: #8b949e; background: #30363d; }
        .vendor-name { font-weight: bold; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        .vendor-price {
            font-size: 1.15rem; font-weight: bold; color: #2ea043;
            background: rgba(46, 160, 67, 0.1); padding: 4px 10px; border-radius: 6px;
        }
        .vendor-price.indisponivel { color: #8b949e; background: transparent; font-size: 0.9rem; }

        @media (max-width: 991px) {
            .card img { height: 320px; }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 border-bottom border-secondary">
        <a class="navbar-brand" href="index.html">
            <img src="imagens/logo_sem_fundo_greedstore.png" alt="Logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link active" href="marketplace.html">Marketplace</a>
                <a class="nav-link" href="decks.html">Decks</a>
                <a class="nav-link" href="comunidade.html">Comunidade</a>
                <a class="nav-link" href="favoritos.html">Favoritos</a>
            </div>
        </div>
    </nav>

    <div class="barra-pesquisa">
        <div class="container">
            <div class="input-group input-group-lg">
                <input type="text" id="campoPesquisa" class="form-control" placeholder="Buscar carta pelo nome...">
                <button class="btn btn-info fw-bold" id="btnPesquisarTop">Pesquisar</button>
            </div>
            <button class="btn btn-outline-info w-100 mt-3 d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#painelFiltros">
                ⚙️ Mostrar Filtros Avançados
            </button>
        </div>
    </div>

    <div class="container mt-4">
        <div class="row g-4">

            <aside class="col-lg-3">
                <div class="collapse d-lg-block" id="painelFiltros">
                    <div class="filtro-container">
                        <h5 class="text-white border-bottom border-secondary pb-2 mb-3">Filtros</h5>
                        
                        <label>Tipo de Carta</label>
                        <select id="filtroTipo" class="form-select form-select-sm">
                            <option value="">Todos</option>
                            <option value="Normal Monster">Monstro Normal</option>
                            <option value="Effect Monster">Monstro de Efeito</option>
                            <option value="Fusion Monster">Monstro de Fusão</option>
                            <option value="Synchro Monster">Monstro Synchro</option>
                            <option value="XYZ Monster">Monstro XYZ</option>
                            <option value="Link Monster">Monstro Link</option>
                            <option value="Spell Card">Carta Mágica</option>
                            <option value="Trap Card">Carta Armadilha</option>
                        </select>

                        <label>Atributo</label>
                        <select id="filtroAtributo" class="form-select form-select-sm">
                            <option value="">Todos</option>
                            <option value="DARK">DARK (Trevas)</option>
                            <option value="LIGHT">LIGHT (Luz)</option>
                            <option value="EARTH">EARTH (Terra)</option>
                            <option value="WATER">WATER (Água)</option>
                            <option value="FIRE">FIRE (Fogo)</option>
                            <option value="WIND">WIND (Vento)</option>
                            <option value="DIVINE">DIVINE (Divino)</option>
                        </select>

                        <label>Nível / Rank</label>
                        <input type="number" id="filtroNivel" class="form-control form-control-sm" min="1" max="12" placeholder="Ex: 4">

                        <div class="row mt-2">
                            <div class="col-6">
                                <label>ATK (Exato)</label>
                                <input type="number" id="filtroAtk" class="form-control form-control-sm" placeholder="ATK">
                            </div>
                            <div class="col-6">
                                <label>DEF (Exato)</label>
                                <input type="number" id="filtroDef" class="form-control form-control-sm" placeholder="DEF">
                            </div>
                        </div>

                        <label class="mt-3 text-info">Faixa de Preço (US$)</label>
                        <div class="row">
                            <div class="col-6">
                                <input type="number" id="filtroPrecoMin" class="form-control form-control-sm" placeholder="Min" step="0.50">
                            </div>
                            <div class="col-6">
                                <input type="number" id="filtroPrecoMax" class="form-control form-control-sm" placeholder="Max" step="0.50">
                            </div>
                        </div>

                        <div class="form-check mt-3">
                            <input class="form-check-input" type="checkbox" id="filtroOcultarSemPreco" checked>
                            <label class="form-check-label text-light" for="filtroOcultarSemPreco" style="margin-top: 0;">
                                Ocultar Indisponíveis
                            </label>
                        </div>

                        <button class="btn btn-info w-100 mt-4 fw-bold" id="btnAplicarFiltros">Aplicar Filtros</button>
                        <button class="btn btn-outline-danger w-100 mt-2 btn-sm" id="btnLimparFiltros">Limpar Tudo</button>
                    </div>
                </div>
            </aside>

            <main class="col-lg-9">
                <div class="row g-4" id="listaCartas">
                    </div>

                <nav class="mt-5 mb-5">
                    <ul class="pagination justify-content-center" id="paginacao">
                        </ul>
                </nav>
            </main>

        </div>
    </div>

    <div class="modal fade" id="cardModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white">Detalhes da Carta</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalCardBody">
                    </div>
            </div>
        </div>
    </div>

    <div id="mensagem" style="position: fixed; top: 20px; right: 20px; background: #28a745; color: white; padding: 10px 20px; border-radius: 5px; display: none; z-index: 9999; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
        ⭐ Adicionado aos favoritos!
    </div>

    <footer class="bg-dark text-center text-white py-4 mt-5 border-top border-secondary">
        <p>&copy; 2026 Greed Store™. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/marketplace.js"></script>
</body>

</html>
