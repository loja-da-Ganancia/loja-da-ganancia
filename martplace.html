<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace | Greed Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f2f2;
        }

        .navbar-brand img {
            height: 45px;
        }

        .barra-pesquisa {
            background: white;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .filtro {
            background: white;
            padding: 20px;
            border-radius: 6px;
        }

        .card {
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .card img {
            height: 250px;
            object-fit: cover;
        }

        /* Responsividade: mobile 1 coluna */
        @media (max-width: 576px) {
            .card img {
                height: 320px;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="#">
            <img src="imagens/logo_sem_fundo_greedstore.png" alt="Logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="martplace.html">Marketplace</a>
                <a class="nav-link" href="decks.html">Decks</a>
                <a class="nav-link" href="comunidade.html">Comunidade</a>
                <a class="nav-link" href="favoritos.html">Favoritos</a>
                <!-- Links de conta dinâmicos (auth.js) -->
            </div>
        </div>
    </nav>

    <div class="barra-pesquisa">
        <div class="container">
            <div class="input-group input-group-lg">
                <input type="text" id="campoPesquisa" class="form-control" placeholder="Pesquisar carta..."
                    onkeyup="pesquisarCarta()">
                <button class="btn btn-dark" onclick="pesquisarCarta()">
                    Pesquisar
                </button>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <div class="row g-4">

            <aside class="col-lg-3">
                <div class="filtro">
                    <h5>Tipo de Carta</h5>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Monstro</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Magia</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Armadilha</label>
                    </div>
                </div>
            </aside>

            <main class="col-lg-9">
                <div class="row g-4" id="listaCartas">
                </div>

                <nav class="mt-4">
                    <ul class="pagination justify-content-center" id="paginacao">
                    </ul>
                </nav>
            </main>

        </div>
    </div>

    <!-- Modal de detalhes da carta (zoom) -->
    <div class="modal fade" id="cardModal" tabindex="-1" aria-labelledby="cardModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="cardModalLabel">Detalhes da Carta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalCardBody">
                    <!-- Conteúdo preenchido via JS -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mensagem" style="
        position: fixed;
        top: 20px;
        right: 20px;
        background: #28a745;
        color: white;
        padding: 10px 20px;
        border-radius: 5px;
        display: none;
        z-index: 999;
        ">
        Adicionado aos favoritos!
    </div>

    <footer class="bg-dark text-center text-white py-3 mt-5">
        <p>&copy; 2026 Greed Store™. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
