<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meu Perfil | Greed Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand img { height: 45px; }
        
        /* Estilos do Banner */
        .banner-perfil {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: linear-gradient(45deg, #2c3e50, #4ca1af);
            position: relative;
            cursor: pointer;
        }
        .banner-perfil img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .banner-perfil.tem-imagem img {
            display: block;
        }

        /* Estilos da Foto de Perfil */
        .perfil-avatar-container {
            position: relative;
            margin-top: -60px;
            display: inline-block;
            cursor: pointer;
            border-radius: 50%;
        }
        .foto-perfil {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid white;
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #adb5bd;
            overflow: hidden;
            position: relative;
        }
        .foto-perfil img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .foto-perfil.tem-imagem img {
            display: block;
        }
        .foto-perfil.tem-imagem span {
            display: none;
        }

        /* Efeito Hover de Edição (Overlay) */
        .edit-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .perfil-avatar-container .edit-overlay {
            border-radius: 50%;
            font-size: 1.5rem;
        }
        .banner-perfil:hover .edit-overlay,
        .perfil-avatar-container:hover .edit-overlay {
            opacity: 1;
        }

        /* Estilo do Nome Editável */
        .nome-editavel {
            cursor: pointer;
            transition: 0.2s;
            padding: 5px 15px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
        }
        .nome-editavel:hover {
            background-color: rgba(0,0,0,0.05);
        }
        .edit-icon {
            font-size: 1.2rem;
            opacity: 0;
            transition: 0.2s;
        }
        .nome-editavel:hover .edit-icon {
            opacity: 1;
        }

        .deck-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .deck-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        @media (max-width: 576px) {
            .banner-perfil { height: 150px; }
            .foto-perfil { width: 90px; height: 90px; margin-top: -45px; font-size: 2rem;}
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="index.html">
            <img src="imagens/logo_sem_fundo_greedstore.png" alt="Logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="martplace.html">Marketplace</a>
                <a class="nav-link" href="decks.html">Decks</a>
                <a class="nav-link" href="comunidade.html">Comunidade</a>
                <a class="nav-link" href="favoritos.html">Favoritos</a>
            </div>
        </div>
    </nav>

    <!-- Banner clicável -->
    <div class="banner-perfil" id="bannerContainer" onclick="abrirModalCapa()">
        <img src="" alt="Banner" id="bannerImg">
        <div class="edit-overlay">✏️ Editar Capa</div>
    </div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-12 text-center">
                <!-- Avatar clicável -->
                <div class="perfil-avatar-container" onclick="abrirModalFoto()">
                    <div class="foto-perfil" id="fotoContainer">
                        <img src="" alt="Foto de Perfil" id="perfilImg">
                        <span id="fotoPlaceholder">👤</span>
                        <div class="edit-overlay">📷 Editar</div>
                    </div>
                </div>

                <!-- Nome clicável -->
                <div class="mt-3">
                    <div class="nome-editavel" onclick="abrirModalNome()" title="Editar Nome">
                        <h2 id="nomeUsuario" class="m-0 fw-bold">Carregando...</h2>
                        <span class="ms-2 edit-icon">✏️</span>
                    </div>
                </div>
                
                <p class="text-muted mt-2" id="bioUsuario">Bem-vindo ao seu perfil! Aqui você pode ver suas informações e seus decks.</p>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-12">
                <h3>📚 Meus Decks</h3>
                <div id="decksDoUsuario" class="row g-4 mt-2"></div>
            </div>
        </div>
    </div>

    <!-- MODAL: Editar Capa -->
    <div class="modal fade" id="modalEditarCapa" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Capa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Escolha uma nova imagem de capa do seu PC:</label>
                    <input type="file" class="form-control" id="inputCapa" accept="image/*">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarCapa()">Salvar Capa</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: Editar Foto -->
    <div class="modal fade" id="modalEditarFoto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Foto de Perfil</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Escolha uma nova foto de perfil do seu PC:</label>
                    <input type="file" class="form-control" id="inputFoto" accept="image/*">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarFoto()">Salvar Foto</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: Editar Nome -->
    <div class="modal fade" id="modalEditarNome" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Nome de Usuário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Novo Nome:</label>
                    <input type="text" class="form-control" id="inputNome" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" onclick="salvarNome()">Salvar Alteração</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-center text-white py-3 mt-5">
        <p>&copy; 2026 Greed Store™. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Protege a página
        if (typeof protegerPagina === 'function') protegerPagina();

        let modalCapa, modalFoto, modalNome;

        document.addEventListener('DOMContentLoaded', () => {
            modalCapa = new bootstrap.Modal(document.getElementById('modalEditarCapa'));
            modalFoto = new bootstrap.Modal(document.getElementById('modalEditarFoto'));
            modalNome = new bootstrap.Modal(document.getElementById('modalEditarNome'));
            
            preencherDadosUsuario();
            carregarDecksUsuario();
        });

        // Preenche dados do usuário na tela
        function preencherDadosUsuario() {
            if (typeof getCurrentUser !== 'undefined') {
                const user = getCurrentUser();
                if (user) {
                    document.getElementById('nomeUsuario').innerText = user.username;
                    
                    // Renderiza Foto
                    const fotoContainer = document.getElementById('fotoContainer');
                    const perfilImg = document.getElementById('perfilImg');
                    if (user.profilePicUrl && user.profilePicUrl !== '') {
                        perfilImg.src = user.profilePicUrl;
                        fotoContainer.classList.add('tem-imagem');
                    } else {
                        perfilImg.src = '';
                        fotoContainer.classList.remove('tem-imagem');
                    }

                    // Renderiza Banner
                    const bannerContainer = document.getElementById('bannerContainer');
                    const bannerImg = document.getElementById('bannerImg');
                    if (user.bannerUrl && user.bannerUrl !== '') {
                        bannerImg.src = user.bannerUrl;
                        bannerContainer.classList.add('tem-imagem');
                    } else {
                        bannerImg.src = '';
                        bannerContainer.classList.remove('tem-imagem');
                    }

                    // Badge Admin
                    if (user.role === 'admin') {
                        const bioUsuario = document.getElementById('bioUsuario');
                        if (!bioUsuario.innerHTML.includes('badge')) {
                             bioUsuario.innerHTML += '<br><span class="badge bg-danger mt-2">Administrador</span>';
                        }
                    }
                }
            }
        }

        /* Funções de Abertura de Modais */
        function abrirModalCapa() {
            document.getElementById('inputCapa').value = '';
            modalCapa.show();
        }

        function abrirModalFoto() {
            document.getElementById('inputFoto').value = '';
            modalFoto.show();
        }

        function abrirModalNome() {
            const user = getCurrentUser();
            if (user) {
                document.getElementById('inputNome').value = user.username;
                modalNome.show();
            }
        }

        /* Funções de Salvamento Específico */
        function salvarCapa() {
            const input = document.getElementById('inputCapa');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    atualizarUsuarioNoBanco({ bannerUrl: e.target.result });
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                alert("Por favor, selecione uma imagem primeiro.");
            }
        }

        function salvarFoto() {
            const input = document.getElementById('inputFoto');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    atualizarUsuarioNoBanco({ profilePicUrl: e.target.result });
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                alert("Por favor, selecione uma imagem primeiro.");
            }
        }

        function salvarNome() {
            const novoNome = document.getElementById('inputNome').value.trim();
            const user = getCurrentUser();

            if (novoNome.length < 3) {
                alert("O nome deve ter pelo menos 3 caracteres.");
                return;
            }

            if (novoNome === user.username) {
                modalNome.hide();
                return; // Não faz nada se o nome for igual
            }

            // MENSAGEM DE CONFIRMAÇÃO EXIGIDA
            const confirmacao = confirm("⚠️ ATENÇÃO:\nVocê está prestes a alterar seu nome de usuário. Isso afetará como você é visto em todo o sistema, incluindo suas postagens na comunidade e seus decks.\n\nDeseja realmente continuar?");
            
            if (confirmacao) {
                atualizarUsuarioNoBanco({ username: novoNome });
            }
        }

        /* Função Central para Atualizar o "Banco de Dados" (LocalStorage + SessionStorage) */
        function atualizarUsuarioNoBanco(novosDados) {
            const sessionData = sessionStorage.getItem('greedstore_session');
            if (!sessionData) return;
            
            const session = JSON.parse(sessionData);
            const originalUsername = session.username;

            let usersData = localStorage.getItem('greedstore_users');
            if (!usersData) return;
            
            let users = JSON.parse(usersData);
            const userIndex = users.findIndex(u => u.username === originalUsername);
            
            if (userIndex !== -1) {
                // Se estiver alterando o nome, verifica se não está em uso
                if (novosDados.username) {
                    if (users.some(u => u.username === novosDados.username)) {
                        alert("Este nome de usuário já está sendo usado por outro Duelista.");
                        return;
                    }
                    users[userIndex].username = novosDados.username;
                    session.username = novosDados.username;
                }

                // Se estiver alterando a foto
                if (novosDados.profilePicUrl !== undefined) {
                    users[userIndex].profilePicUrl = novosDados.profilePicUrl;
                    session.profilePicUrl = novosDados.profilePicUrl;
                }

                // Se estiver alterando a capa
                if (novosDados.bannerUrl !== undefined) {
                    users[userIndex].bannerUrl = novosDados.bannerUrl;
                    session.bannerUrl = novosDados.bannerUrl;
                }
                
                // Salva tudo e recarrega a página
                localStorage.setItem('greedstore_users', JSON.stringify(users));
                sessionStorage.setItem('greedstore_session', JSON.stringify(session));

                window.location.reload(); 
            } else {
                alert("Erro ao localizar seu usuário no banco de dados.");
            }
        }

        // Carrega decks do usuário
        function carregarDecksUsuario() {
            const container = document.getElementById('decksDoUsuario');
            if (!container) return;

            const decks = JSON.parse(localStorage.getItem('greedstore_decks') || '[]');
            if (decks.length === 0) {
                container.innerHTML = '<div class="col-12 text-center text-muted">Você ainda não criou nenhum deck. <a href="decks.html">Crie agora!</a></div>';
                return;
            }

            container.innerHTML = '';
            decks.forEach(deck => {
                const col = document.createElement('div');
                col.className = 'col-12 col-sm-6 col-md-4 col-lg-3';
                col.innerHTML = `
                    <div class="deck-card h-100">
                        <h5>${escapeHtml(deck.nome)}</h5>
                        <p class="text-muted">${deck.cartas.length} carta(s)</p>
                        <a href="decks.html" class="btn btn-sm btn-primary">Gerenciar</a>
                    </div>
                `;
                container.appendChild(col);
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
