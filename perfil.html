<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meu Perfil | Greed Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ===== ESTILO GERAL ESCURO ===== */
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: Arial, Helvetica, sans-serif;
        }

        .navbar-brand img { height: 45px; }

        /* ===== BANNER ===== */
        .banner-perfil {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: linear-gradient(45deg, #2c3e50, #4ca1af);
            position: relative;
            cursor: pointer;
            border-bottom: 1px solid #30363d;
        }
        .banner-perfil img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .banner-perfil.tem-imagem img {
            display: block;
        }

        /* ===== FOTO DE PERFIL ===== */
        .perfil-avatar-container {
            position: relative;
            margin-top: -60px;
            display: inline-block;
            cursor: pointer;
            border-radius: 50%;
        }
        .foto-perfil {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #0d1117;
            background-color: #161b22;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #8b949e;
            overflow: hidden;
            position: relative;
        }
        .foto-perfil img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .foto-perfil.tem-imagem img {
            display: block;
        }
        .foto-perfil.tem-imagem span {
            display: none;
        }

        /* ===== OVERLAY DE EDIÇÃO ===== */
        .edit-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            z-index: 10;
            border-radius: inherit;
        }
        .perfil-avatar-container .edit-overlay {
            border-radius: 50%;
            font-size: 1.5rem;
        }
        .banner-perfil:hover .edit-overlay,
        .perfil-avatar-container:hover .edit-overlay {
            opacity: 1;
        }

        /* ===== NOME EDITÁVEL ===== */
        .nome-editavel {
            cursor: pointer;
            transition: 0.2s;
            padding: 5px 15px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            color: #ffffff;
        }
        .nome-editavel:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .edit-icon {
            font-size: 1.2rem;
            opacity: 0;
            transition: 0.2s;
            color: #00d2ff;
        }
        .nome-editavel:hover .edit-icon {
            opacity: 1;
        }

        /* ===== CARDS DOS DECKS ===== */
        .deck-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            transition: 0.2s;
            height: 100%;
            color: #c9d1d9;
        }
        .deck-card:hover {
            transform: translateY(-2px);
            border-color: #00d2ff;
            box-shadow: 0 4px 10px rgba(0, 210, 255, 0.15);
        }
        .deck-card h5 {
            color: #ffffff;
        }
        .deck-card .text-muted {
            color: #8b949e !important;
        }

        /* ===== MODAIS ESCUROS ===== */
        .modal-content {
            background-color: #161b22;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }
        .modal-header, .modal-footer {
            border-color: #30363d;
        }
        .modal-title {
            color: #ffffff;
        }
        .btn-close-white {
            filter: invert(1);
        }
        .form-control, .form-select {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }
        .form-control:focus, .form-select:focus {
            background-color: #0d1117;
            color: #ffffff;
            border-color: #00d2ff;
            box-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
        }
        .btn-primary {
            background-color: #00d2ff;
            border-color: #00d2ff;
            color: #000;
        }
        .btn-primary:hover {
            background-color: #00b8e0;
            border-color: #00b8e0;
        }
        .btn-danger {
            background-color: #e53238;
            border-color: #e53238;
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 576px) {
            .banner-perfil { height: 150px; }
            .foto-perfil { width: 90px; height: 90px; margin-top: -45px; font-size: 2rem;}
        }

        /* ===== TÍTULOS ===== */
        h2, h3, h4, h5 {
            color: #ffffff;
        }
        .text-muted {
            color: #8b949e !important;
        }
        hr {
            border-color: #30363d;
        }
        a {
            color: #00d2ff;
            text-decoration: none;
        }
        a:hover {
            color: #ffc107;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 border-bottom border-secondary">
        <a class="navbar-brand" href="index.html">
            <img src="imagens/logo_sem_fundo_greedstore.png" alt="Logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="marketplace.html">Marketplace</a>
                <a class="nav-link" href="decks.html">Decks</a>
                <a class="nav-link" href="comunidade.html">Comunidade</a>
                <a class="nav-link" href="favoritos.html">Favoritos</a>
            </div>
        </div>
    </nav>

    <!-- Banner clicável -->
    <div class="banner-perfil" id="bannerContainer" onclick="abrirModalCapa()">
        <img src="" alt="Banner" id="bannerImg">
        <div class="edit-overlay">✏️ Editar Capa</div>
    </div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-12 text-center">
                <!-- Avatar clicável -->
                <div class="perfil-avatar-container" onclick="abrirModalFoto()">
                    <div class="foto-perfil" id="fotoContainer">
                        <img src="" alt="Foto de Perfil" id="perfilImg">
                        <span id="fotoPlaceholder">👤</span>
                        <div class="edit-overlay">📷 Editar</div>
                    </div>
                </div>

                <!-- Nome clicável -->
                <div class="mt-3">
                    <div class="nome-editavel" onclick="abrirModalNome()" title="Editar Nome">
                        <h2 id="nomeUsuario" class="m-0 fw-bold">Carregando...</h2>
                        <span class="ms-2 edit-icon">✏️</span>
                    </div>
                </div>
                
                <p class="mt-2" id="bioUsuario" style="color: #8b949e;">Bem-vindo ao seu perfil! Aqui você pode ver suas informações e seus decks.</p>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-12">
                <h3 class="border-bottom border-secondary pb-2">📚 Meus Decks</h3>
                <div id="decksDoUsuario" class="row g-4 mt-2"></div>
            </div>
        </div>
    </div>

    <!-- MODAL: Editar Capa -->
    <div class="modal fade" id="modalEditarCapa" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Editar Capa</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Escolha uma nova imagem de capa do seu PC:</label>
                    <input type="file" class="form-control" id="inputCapa" accept="image/*">
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarCapa()">Salvar Capa</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: Editar Foto -->
    <div class="modal fade" id="modalEditarFoto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Editar Foto de Perfil</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Escolha uma nova foto de perfil do seu PC:</label>
                    <input type="file" class="form-control" id="inputFoto" accept="image/*">
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarFoto()">Salvar Foto</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: Editar Nome -->
    <div class="modal fade" id="modalEditarNome" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Editar Nome de Usuário</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Novo Nome:</label>
                    <input type="text" class="form-control" id="inputNome" required>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" onclick="salvarNome()">Salvar Alteração</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-center text-white py-4 mt-5 border-top border-secondary">
        <p>&copy; 2026 Greed Store™. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/perfil.js"></script>
</body>
</html>
