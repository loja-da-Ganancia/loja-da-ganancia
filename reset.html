<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redefinir Senha | Greed Store</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .form-container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body class="bg-light">

<div class="container">
    <div class="form-container">

        <h3 class="text-center mb-4">Redefinir Senha</h3>

        <div class="mb-3">
            <label class="form-label">Nova senha</label>
            <input type="password" id="novaSenha" class="form-control" placeholder="Digite sua nova senha">
        </div>

        <button onclick="resetar()" class="btn btn-dark w-100">
            Redefinir Senha
        </button>

    </div>
</div>

<!-- auth.js -->
<script src="js/auth.js"></script>

<script>
    // 🔥 pega o token da URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    function resetar() {
        const senha = document.getElementById('novaSenha').value;

        const res = redefinirSenhaComToken(token, senha);

        alert(res.message);

        if (res.success) {
            window.location.href = 'contas.html';
        }
    }
</script>

</body>
</html>
